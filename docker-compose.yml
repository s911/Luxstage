version: '3.8'

services:
  web:
    image: wordpress:latest  # 直接使用官方封装好的 WordPress 镜像，不再从零构建 RockyLinux
    ports:
      - "8080:80"
    restart: always
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: luxstage_user
      WORDPRESS_DB_PASSWORD: luxstage
      WORDPRESS_DB_NAME: luxstage_b2b
      LUXSTAGE_MAIL_MODE: mailpit
      LUXSTAGE_SMTP_HOST: mailpit
      LUXSTAGE_SMTP_PORT: 1025
      LUXSTAGE_MAIL_FROM: no-reply@luxstage.local
      LUXSTAGE_MAIL_FROM_NAME: Luxstage Local
    volumes:
      - ./src:/var/www/html:Z  # 在 SELinux 环境允许容器写入挂载目录
      - ./deploy/php/custom.ini:/usr/local/etc/php/conf.d/zz-luxstage-custom.ini:ro
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_started

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: luxstage_b2b
      MYSQL_USER: luxstage_user
      MYSQL_PASSWORD: luxstage
      MYSQL_ROOT_PASSWORD: luxstage
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 20
      start_period: 30s

  mailpit:
    image: axllent/mailpit:latest
    restart: always
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  db_data:
