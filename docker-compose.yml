version: '3.8'

services:
  web:
    image: wordpress:latest  # 直接使用官方封装好的 WordPress 镜像，不再从零构建 RockyLinux
    ports:
      - "8080:80"
    restart: always
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: ${DB_USER:-wp_user}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD:-wp_pass}
      WORDPRESS_DB_NAME: ${DB_NAME:-wp_stage_lighting}
    volumes:
      - ./src:/var/www/html  # 依然完美挂载你的本地开发代码目录
    depends_on:
      - db

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME:-wp_stage_lighting}
      MYSQL_USER: ${DB_USER:-wp_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-wp_pass}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-wp_root_pass}
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
