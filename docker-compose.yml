version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    container_name: luxstage-web
    ports:
      - "8080:80"
    env_file:
      - .env
    environment:
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: ${DB_HOST}
      WP_CORE_VERSION: ${WP_CORE_VERSION}
    volumes:
      - ./src:/var/www/html
      - ./install-plugins.sh:/usr/local/bin/install-plugins.sh:ro
      - wp_runtime_data:/var/www/.wp-cli
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - luxstage_net

  db:
    image: mysql:8.0
    container_name: luxstage-db
    command:
      - --default-authentication-plugin=mysql_native_password
      - --sql-mode=STRICT_TRANS_TABLES,ERROR_FOR_DIVISION_BY_ZERO,NO_ENGINE_SUBSTITUTION
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    restart: unless-stopped
    networks:
      - luxstage_net

volumes:
  db_data:
  wp_runtime_data:

networks:
  luxstage_net:
    driver: bridge
